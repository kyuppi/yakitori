<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ひまわり店長専用 | 管理パネル</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #0c0a09; color: #e7e5e4; }
        .admin-card { background: #1c1917; border: 1px solid #292524; border-radius: 1.5rem; }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }
    </style>
</head>
<body class="pb-12">

    <!-- Auth Guard (パスワード: 613613613) -->
    <div id="auth-screen" class="fixed inset-0 bg-stone-950 z-[100] flex flex-col items-center justify-center p-6 transition-opacity duration-500">
        <div class="bg-stone-900 w-full max-sm:w-full max-w-sm rounded-[2.5rem] p-10 shadow-2xl border border-stone-800 text-center">
            <div class="bg-orange-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg shadow-orange-900/40">
                <i data-lucide="shield-check" class="text-white w-8 h-8"></i>
            </div>
            <h1 class="text-xl font-black mb-8 tracking-widest italic">HIMAWARI ADMIN</h1>
            <p id="auth-status" class="text-[10px] text-stone-500 mb-4 font-bold uppercase tracking-widest italic">System Standby</p>
            <input type="password" id="pass-input" placeholder="PASSCODE" class="w-full p-4 bg-stone-950 rounded-2xl mb-4 text-center font-bold outline-none border border-stone-800 focus:border-orange-600 transition-all tracking-[0.2em] text-2xl text-orange-500">
            <button id="login-btn" class="w-full bg-orange-600 hover:bg-orange-500 text-white font-black py-4 rounded-2xl transition-all active:scale-95">ログイン</button>
        </div>
    </div>

    <!-- Delete Confirm Modal -->
    <div id="delete-modal" class="fixed inset-0 bg-black/90 z-[110] hidden flex items-center justify-center p-6">
        <div class="bg-stone-900 border border-stone-800 p-8 rounded-[2rem] max-w-xs w-full text-center">
            <i data-lucide="alert-triangle" class="w-12 h-12 text-red-500 mx-auto mb-4"></i>
            <h3 class="text-lg font-black mb-2 text-white">全データを削除しますか？</h3>
            <p class="text-sm text-stone-400 mb-8 font-bold">この操作は取り消せません。<br>全ての予約一覧が空になります。</p>
            <div class="space-y-3">
                <button id="confirm-delete-btn" class="w-full bg-red-600 text-white font-black py-4 rounded-2xl">はい、削除します</button>
                <button onclick="toggleDeleteModal(false)" class="w-full bg-stone-800 text-stone-400 font-black py-4 rounded-2xl">キャンセル</button>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div id="main-content" class="hidden">
        <header class="sticky top-0 z-40 bg-stone-950/80 backdrop-blur-md border-b border-stone-800">
            <div class="max-w-4xl mx-auto px-6 h-20 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="bg-orange-600 p-1.5 rounded-lg"><i data-lucide="layout-dashboard" class="text-white w-5 h-5"></i></div>
                    <h1 class="font-black text-lg italic tracking-tighter">ADMIN PANEL</h1>
                </div>
                <button id="logout-btn" class="bg-stone-900 text-stone-500 p-3 rounded-xl hover:text-white transition-all"><i data-lucide="log-out" class="w-5 h-5"></i></button>
            </div>
        </header>

        <main class="max-w-4xl mx-auto p-6 space-y-8">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                
                <!-- Inventory & Settings (Left Column) -->
                <div class="lg:col-span-1 space-y-8">
                    <!-- Stock Management -->
                    <section class="admin-card overflow-hidden">
                        <div class="p-5 border-b border-stone-800 flex justify-between items-center bg-stone-900/50">
                            <h3 class="text-xs font-black uppercase tracking-widest text-orange-500 flex items-center gap-2">
                                <i data-lucide="package" class="w-3 h-3"></i> 売り切れ設定
                            </h3>
                        </div>
                        <div id="inventory-grid" class="p-4 grid grid-cols-2 gap-2"></div>
                    </section>

                    <!-- Holiday Management -->
                    <section class="admin-card overflow-hidden border-red-900/20">
                        <div class="p-5 border-b border-stone-800 flex justify-between items-center bg-red-950/10">
                            <h3 class="text-xs font-black uppercase tracking-widest text-red-500 flex items-center gap-2">
                                <i data-lucide="calendar-off" class="w-3 h-3"></i> 臨時定休日設定
                            </h3>
                        </div>
                        <div class="p-5 space-y-4">
                            <div class="flex gap-2">
                                <input type="date" id="holiday-input" class="flex-1 bg-stone-950 border border-stone-800 rounded-xl px-3 py-2 text-sm font-bold text-white focus:border-red-600 outline-none">
                                <button id="add-holiday-btn" class="bg-red-900/30 text-red-500 px-4 py-2 rounded-xl border border-red-800 text-xs font-black transition-all active:scale-95">追加</button>
                            </div>
                            <div id="holiday-list" class="space-y-2 max-h-40 overflow-y-auto pr-2"></div>
                        </div>
                    </section>
                </div>

                <!-- Orders (Right Column) -->
                <div class="lg:col-span-2 space-y-4">
                    <div class="flex items-center justify-between px-2">
                        <h3 class="text-xs font-black uppercase tracking-widest text-stone-500 flex items-center gap-2">
                            <i data-lucide="clock" class="w-4 h-4"></i> 最新の予約状況
                            <span id="order-count" class="bg-orange-600 text-white text-[10px] px-2 py-0.5 rounded-full ml-1 hidden">0</span>
                        </h3>
                        <button onclick="toggleDeleteModal(true)" id="bulk-delete-btn" class="text-[10px] font-black bg-red-950/50 text-red-400 px-4 py-2 rounded-full border border-red-900/50 hover:bg-red-900 transition-all flex items-center gap-1">
                            <i data-lucide="trash-2" class="w-3 h-3"></i> 予約データを全件削除
                        </button>
                    </div>
                    <div id="reservations-list" class="space-y-4"></div>
                </div>

            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, getDocs, deleteDoc, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebaseの設定を固定（GitHub Pagesなど外部ドメインでも動くように）
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyBFHd2b0KlHvpgMi-oax7llhNaQV-yiLq8",
            authDomain: "yakitori-81aab.firebaseapp.com",
            projectId: "yakitori-81aab",
            storageBucket: "yakitori-81aab.firebasestorage.app",
            appId: "1:765393606286:web:755c313fbed6e8ea42dbdf"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        // 保存先IDを統一
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'yakitori-himawari-main';

        const MENU = [
            { id: 'm1', name: 'ねぎま' }, { id: 'm2', name: '焼き鳥' }, { id: 'm3', name: '手羽中' },
            { id: 'm4', name: '鳥軟骨' }, { id: 'm5', name: '豚レバー' }, { id: 'm6', name: 'カシラ' },
            { id: 'm7', name: '豚タン' }, { id: 'm8', name: '豚白モツ' }, { id: 'm9', name: '鶏皮' },
            { id: 'm10', name: 'つくね' }, { id: 'm11', name: 'むねニンニク' }
        ];

        let soldOutItems = {};
        let reservations = [];
        let holidays = [];
        let unsubscribes = [];

        async function init() {
            lucide.createIcons();
            
            document.getElementById('login-btn').onclick = async () => {
                const pass = document.getElementById('pass-input').value;
                if(pass === '613613613') {
                    const btn = document.getElementById('login-btn');
                    btn.disabled = true;
                    btn.innerText = "認証中...";

                    try {
                        // 1. 認証開始 (外部環境ではカスタムトークンが不一致になるため、エラーが出たら即匿名へ)
                        let loginSuccess = false;
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            try {
                                await signInWithCustomToken(auth, __initial_auth_token);
                                loginSuccess = true;
                            } catch (tokenError) {
                                console.warn("Canvas Token rejected, falling back to anonymous.");
                            }
                        }
                        
                        if (!loginSuccess) {
                            await signInAnonymously(auth);
                        }

                        // 2. 認証完了待機
                        let attempts = 0;
                        while(!auth.currentUser && attempts < 25) {
                            await new Promise(r => setTimeout(r, 200));
                            attempts++;
                        }

                        if (!auth.currentUser) throw new Error("認証に時間がかかりすぎています。ページを更新してください。");

                        // 3. データ同期開始
                        startSync();

                        // 4. UI表示切り替え
                        document.getElementById('auth-screen').classList.add('hidden');
                        document.getElementById('main-content').classList.remove('hidden');
                        
                    } catch (error) {
                        console.error("Login Error:", error);
                        alert("ログインに失敗しました: " + error.message);
                    } finally {
                        btn.disabled = false;
                        btn.innerText = "ログイン";
                    }
                } else {
                    alert("パスコードが違います");
                }
            };

            // 全件削除
            document.getElementById('confirm-delete-btn').onclick = async () => {
                if (!auth.currentUser) return;
                try {
                    const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'reservations');
                    const snap = await getDocs(colRef);
                    const deletePromises = snap.docs.map(d => deleteDoc(d.ref));
                    await Promise.all(deletePromises);
                    toggleDeleteModal(false);
                } catch (e) { console.error("Delete Error:", e); }
            };

            // 休日追加
            document.getElementById('add-holiday-btn').onclick = async () => {
                if (!auth.currentUser) return;
                const date = document.getElementById('holiday-input').value;
                if(!date) return;
                try {
                    const holidayRef = doc(db, 'artifacts', appId, 'public', 'data', 'config', 'holidays');
                    await setDoc(holidayRef, { dates: arrayUnion(date) }, { merge: true });
                    document.getElementById('holiday-input').value = "";
                } catch (e) { console.error("Holiday Add Error:", e); }
            };
        }

        window.toggleDeleteModal = (show) => {
            document.getElementById('delete-modal').classList.toggle('hidden', !show);
        };

        function startSync() {
            unsubscribes.forEach(unsub => unsub());
            unsubscribes = [];

            if (!auth.currentUser) return;

            // 1. 在庫同期
            unsubscribes.push(onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'inventory', 'status'), 
                (snap) => {
                    soldOutItems = snap.exists() ? snap.data().soldOut || {} : {};
                    renderInventory();
                }, (err) => console.error("Inventory Sync Error:", err)));

            // 2. 休日同期
            unsubscribes.push(onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'holidays'), 
                (snap) => {
                    holidays = snap.exists() ? snap.data().dates || [] : [];
                    renderHolidays();
                }, (err) => console.error("Holidays Sync Error:", err)));

            // 3. 予約リスト同期
            unsubscribes.push(onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'reservations'), 
                (snap) => {
                    reservations = snap.docs.map(d => ({ id: d.id, ...d.data() }))
                        .sort((a,b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                    renderReservations();
                }, (err) => console.error("Reservations Sync Error:", err)));
        }

        function renderInventory() {
            const grid = document.getElementById('inventory-grid');
            if (!grid) return;
            grid.innerHTML = MENU.map(item => {
                const isSold = soldOutItems[item.id];
                return `
                <button onclick="window.toggleStock('${item.id}')" 
                    class="p-3 rounded-xl border font-black text-[10px] transition-all flex flex-col items-center gap-1 active:scale-95 ${isSold ? 'bg-red-950/30 border-red-800 text-red-500' : 'bg-stone-800/50 border-stone-700 text-stone-300'}">
                    <span>${item.name}</span>
                    <span class="text-[7px] px-1.5 py-0.5 rounded-full ${isSold ? 'bg-red-600 text-white' : 'bg-stone-700 text-stone-500'}">
                        ${isSold ? '売切' : '販売'}
                    </span>
                </button>`;
            }).join('');
        }

        function renderHolidays() {
            const list = document.getElementById('holiday-list');
            if (!list) return;
            if(holidays.length === 0) {
                list.innerHTML = `<p class="text-[10px] text-stone-600 text-center py-2 font-bold italic">設定なし</p>`;
                return;
            }
            const sortedHolidays = [...holidays].sort();
            list.innerHTML = sortedHolidays.map(date => `
                <div class="flex items-center justify-between bg-stone-950 p-2 rounded-xl border border-stone-800 mb-1">
                    <span class="text-xs font-black text-stone-300">${date}</span>
                    <button onclick="window.removeHoliday('${date}')" class="text-stone-600 hover:text-red-500 p-1">
                        <i data-lucide="x" class="w-3 h-3"></i>
                    </button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        window.toggleStock = async (id) => {
            if (!auth.currentUser) return;
            const newSold = { ...soldOutItems, [id]: !soldOutItems[id] };
            try {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'inventory', 'status'), { soldOut: newSold }, { merge: true });
            } catch (e) { console.error("Stock Update Error:", e); }
        };

        window.removeHoliday = async (date) => {
            if (!auth.currentUser) return;
            try {
                const holidayRef = doc(db, 'artifacts', appId, 'public', 'data', 'config', 'holidays');
                await updateDoc(holidayRef, { dates: arrayRemove(date) });
            } catch (e) { console.error("Holiday Remove Error:", e); }
        };

        function renderReservations() {
            const list = document.getElementById('reservations-list');
            if (!list) return;
            const deleteBtn = document.getElementById('bulk-delete-btn');
            const countBadge = document.getElementById('order-count');
            
            if(reservations.length === 0) {
                list.innerHTML = `<div class="text-center py-10 text-stone-600 italic font-bold">現在、予約はありません。</div>`;
                deleteBtn.classList.add('hidden');
                countBadge.classList.add('hidden');
            } else {
                deleteBtn.classList.remove('hidden');
                countBadge.innerText = reservations.length;
                countBadge.classList.remove('hidden');
                list.innerHTML = reservations.map(res => `
                    <div class="admin-card p-6 space-y-4 relative overflow-hidden">
                        <div class="absolute top-0 right-0 bg-orange-600/10 text-orange-500 px-4 py-1 rounded-bl-2xl font-black text-xs tracking-widest border-l border-b border-orange-600/20">
                            #${res.orderId || '----'}
                        </div>
                        <div class="flex justify-between items-start">
                            <div>
                                <h4 class="text-xl font-black text-white">${res.name} 様</h4>
                                <a href="tel:${res.phone}" class="text-xs text-orange-500 font-bold hover:underline">${res.phone}</a>
                            </div>
                            <div class="text-right">
                                <p class="text-lg font-black text-orange-500 italic underline decoration-orange-600/30">${res.date}</p>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-x-6 gap-y-1 text-[11px] font-bold text-stone-400 border-t border-stone-800 pt-4">
                            ${Object.entries(res.items || {}).map(([key, qty]) => {
                                const [mId, typeId] = key.split('-');
                                const menuName = MENU.find(m => m.id === mId)?.name || '不明';
                                const typeName = typeId === 'sauce' ? 'タレ' : '塩';
                                return `
                                <div class="flex justify-between border-b border-stone-800/50 pb-1 italic">
                                    <span>${menuName} (${typeName})</span>
                                    <span class="text-stone-100">${qty}本</span>
                                </div>`;
                            }).join('')}
                        </div>
                        <div class="flex justify-between items-center pt-2">
                             <p class="text-[9px] text-stone-600 font-bold">注文時刻: ${res.createdAt ? new Date(res.createdAt.seconds * 1000).toLocaleString('ja-JP', {hour:'2-digit', minute:'2-digit'}) : '--:--'}</p>
                             <div class="text-right font-black text-stone-100 text-sm">
                                <span class="text-[10px] text-stone-500 mr-2 uppercase tracking-widest">Total</span>
                                ¥${(res.total || 0).toLocaleString()}
                             </div>
                        </div>
                    </div>
                `).join('');
            }
        }

        document.getElementById('logout-btn').onclick = () => location.reload();
        init();
    </script>
</body>
</html>
