<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>予約 | やきとり ひまわり</title>
    
    <!-- PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ひまわり予約">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3063/3063822.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; -webkit-tap-highlight-color: transparent; }
        .loading-spinner { border: 3px solid rgba(234, 88, 12, 0.1); border-left-color: #ea580c; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        /* Safe area for notched devices */
        .safe-pb { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="bg-stone-100 pb-32 text-stone-900">

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="fixed inset-0 bg-white/80 backdrop-blur-sm z-[100] flex items-center justify-center hidden">
        <div class="flex flex-col items-center gap-3">
            <div class="loading-spinner"></div>
            <p class="text-[10px] font-black text-orange-600 tracking-widest uppercase">Processing...</p>
        </div>
    </div>

    <!-- 店長用：通知・PWA設定パネル -->
    <div id="admin-panel" class="hidden bg-stone-900 text-white p-4 text-[11px] space-y-2">
        <div class="flex justify-between items-center">
            <span class="font-bold text-orange-500">【店長専用モード】</span>
            <button onclick="this.parentElement.parentElement.remove()" class="text-stone-500">✕</button>
        </div>
        <p>1. 下のボタンで通知を許可してください。</p>
        <p>2. ブラウザのメニューから「ホーム画面に追加」してください。アプリとして常駐しやすくなります。</p>
        <button id="enable-notify-btn" class="w-full bg-orange-600 py-2 rounded-lg font-black mt-1">プッシュ通知を有効にする</button>
    </div>

    <!-- Header -->
    <header class="bg-white/80 backdrop-blur-md border-b border-stone-200 sticky top-0 z-40 px-6 py-4">
        <div class="max-w-2xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-orange-600 p-2 rounded-xl text-white shadow-lg shadow-orange-200">
                    <i data-lucide="store" class="w-5 h-5"></i>
                </div>
                <div>
                    <h1 class="text-lg font-black italic tracking-tighter leading-none">やきとり ひまわり</h1>
                    <p class="text-[10px] text-stone-400 font-bold mt-1 tracking-widest uppercase">Takeout Reservation</p>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main id="main-content" class="max-w-2xl mx-auto p-4 space-y-6">
        <section class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-stone-200 space-y-4">
            <div class="flex items-center gap-2 mb-2">
                <i data-lucide="user" class="text-orange-600 w-4 h-4"></i>
                <h3 class="font-black text-xs uppercase tracking-widest text-stone-400">お客様情報</h3>
            </div>
            
            <div class="space-y-3">
                <div class="grid grid-cols-2 gap-3">
                    <div class="relative">
                        <i data-lucide="calendar" class="absolute left-4 top-1/2 -translate-y-1/2 text-stone-300 w-5 h-5"></i>
                        <input type="date" id="order-date" required class="w-full pl-12 pr-4 py-4 bg-stone-50 rounded-2xl font-bold border-none focus:ring-2 focus:ring-orange-500 transition-all text-sm">
                    </div>
                    <div class="relative">
                        <i data-lucide="clock-3" class="absolute left-4 top-1/2 -translate-y-1/2 text-stone-300 w-5 h-5"></i>
                        <select id="order-time" required class="w-full pl-12 pr-4 py-4 bg-stone-50 rounded-2xl font-bold border-none focus:ring-2 focus:ring-orange-500 transition-all text-sm appearance-none">
                            <option value="">受取時間</option>
                            <option value="16:30">16:30</option>
                            <option value="16:45">16:45</option>
                            <option value="17:00">17:00</option>
                            <option value="17:15">17:15</option>
                            <option value="17:30">17:30</option>
                            <option value="17:45">17:45</option>
                            <option value="18:00">18:00</option>
                            <option value="18:15">18:15</option>
                            <option value="18:30">18:30</option>
                            <option value="18:45">18:45</option>
                            <option value="19:00">19:00</option>
                            <option value="19:15">19:15</option>
                            <option value="19:30">19:30</option>
                        </select>
                    </div>
                </div>
                
                <div id="location-box" class="p-4 bg-orange-50 rounded-2xl border border-orange-100 flex items-start gap-3 transition-colors">
                    <i data-lucide="map-pin" id="location-icon" class="text-orange-600 shrink-0 mt-0.5 w-4 h-4"></i>
                    <div>
                        <p class="text-[10px] font-black text-orange-400 uppercase tracking-widest">受取場所</p>
                        <p id="location-text" class="font-black text-sm text-orange-900">日付を選択してください</p>
                    </div>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    <input type="text" id="customer-name" required placeholder="お名前" class="w-full px-6 py-4 bg-stone-50 rounded-2xl font-bold border-none">
                    <input type="tel" id="customer-phone" required placeholder="電話番号" class="w-full px-6 py-4 bg-stone-50 rounded-2xl font-bold border-none">
                </div>
            </div>
        </section>

        <section class="space-y-4">
            <div class="flex items-center justify-between px-2">
                <div class="flex items-center gap-2">
                    <i data-lucide="clock" class="text-orange-600 w-4 h-4"></i>
                    <h3 class="font-black text-xs uppercase tracking-widest text-stone-400">お品書き</h3>
                </div>
            </div>
            <div id="menu-container" class="grid gap-3"></div>
        </section>
    </main>

    <!-- Success Screen -->
    <div id="success-screen" class="min-h-screen bg-stone-50 flex items-center justify-center p-6 text-center hidden">
        <div class="bg-white p-10 rounded-[3rem] shadow-xl border border-stone-200 max-w-sm w-full">
            <div class="bg-green-100 text-green-600 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6">
                <i data-lucide="check-circle" class="w-10 h-10"></i>
            </div>
            <h2 class="text-2xl font-black mb-2">予約完了！</h2>
            <p id="display-order-id" class="text-4xl font-black text-stone-900 tracking-widest mb-8">#----</p>
            <button onclick="location.reload()" class="w-full bg-stone-900 text-white font-black py-4 rounded-2xl">戻る</button>
        </div>
    </div>

    <!-- Footer -->
    <div id="footer-bar" class="fixed bottom-8 left-4 right-4 z-50 safe-pb">
        <div class="max-w-2xl mx-auto bg-stone-900 text-white p-4 rounded-[2.5rem] shadow-2xl flex items-center gap-4 border border-white/10">
            <div class="pl-4">
                <span id="total-price" class="text-2xl font-black text-orange-500 italic">¥0</span>
            </div>
            <button id="submit-btn" disabled class="flex-1 bg-orange-600 text-white font-black py-4 rounded-2xl transition-all active:scale-95 disabled:bg-stone-700 disabled:text-stone-500">予約を確定する</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, doc, onSnapshot, serverTimestamp, query, limit, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBFHd2b0KlHvpgMi-oax7llhNaQV-yiLq8",
            authDomain: "yakitori-81aab.firebaseapp.com",
            projectId: "yakitori-81aab",
            storageBucket: "yakitori-81aab.firebasestorage.app",
            appId: "1:765393606286:web:755c313fbed6e8ea42dbdf"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'yakitori-himawari-main';

        const MENU_ITEMS = [
            { id: 'm1', name: 'ねぎま', price: 140 }, { id: 'm2', name: '焼き鳥', price: 140 },
            { id: 'm3', name: '手羽中', price: 140 }, { id: 'm4', name: '鳥軟骨', price: 140 },
            { id: 'm5', name: '豚レバー', price: 140 }, { id: 'm6', name: 'カシラ', price: 140 },
            { id: 'm7', name: '豚タン', price: 140 }, { id: 'm8', name: '豚白モツ', price: 120 },
            { id: 'm9', name: '鶏皮', price: 120 }, { id: 'm10', name: 'つくね', price: 120 },
            { id: 'm11', name: 'むね肉ニンニク', price: 120 }
        ];
        const FLAVORS = ['タレ', '塩', '無'];
        const SCHEDULE = { 0: 'ジョイフーズ 藪塚店', 4: 'ジョイフーズ 藪塚店', 5: 'アバンセ 玉村店', 6: 'アバンセ 粕川店' };

        let cart = {};
        let soldOutItems = {};
        let holidays = [];
        let isFirstLoad = true;

        onAuthStateChanged(auth, (u) => { 
            if (!u) signInAnonymously(auth); 
            else startSync(); 
        });

        function startSync() {
            // 在庫と休日
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'inventory', 'status'), (snap) => {
                soldOutItems = snap.exists() ? snap.data().soldOut || {} : {};
                renderMenu();
            });
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'config', 'holidays'), (snap) => {
                holidays = snap.exists() ? snap.data().dates || [] : [];
                updateUI();
            });

            // 通知監視（店長用）
            const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'reservations'), orderBy('createdAt', 'desc'), limit(1));
            onSnapshot(q, (snapshot) => {
                if (isFirstLoad) {
                    isFirstLoad = false;
                    return;
                }
                snapshot.docChanges().forEach((change) => {
                    if (change.type === "added") {
                        triggerNotification(change.doc.data());
                    }
                });
            });

            checkAdminStatus();
        }

        // 店長かどうかを簡易判定（通知ボタンの表示制御）
        function checkAdminStatus() {
            if (location.search.includes('admin=true') || Notification.permission === "default") {
                document.getElementById('admin-panel').classList.remove('hidden');
            }
        }

        window.requestNotificationPermission = async () => {
            const permission = await Notification.requestPermission();
            if (permission === "granted") {
                document.getElementById('admin-panel').classList.add('hidden');
                new Notification("通知有効化", { body: "予約が入るとここにお知らせします" });
            }
        };
        document.getElementById('enable-notify-btn').onclick = window.requestNotificationPermission;

        function triggerNotification(data) {
            if (Notification.permission === "granted") {
                const n = new Notification("【新着予約】", {
                    body: `${data.name}様 / ${data.time}受取 / ¥${data.total}`,
                    icon: "https://cdn-icons-png.flaticon.com/512/3063/3063822.png",
                    tag: "new-order",
                    renotify: true
                });
                
                const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');
                audio.play().catch(() => console.log("Audio needs interaction"));
                
                n.onclick = () => { window.focus(); };
            }
        }

        function renderMenu() {
            const container = document.getElementById('menu-container');
            container.innerHTML = MENU_ITEMS.map(item => {
                const isSoldOut = soldOutItems[item.id];
                return `
                    <div class="bg-white rounded-3xl border border-stone-200 p-5 relative transition-all ${isSoldOut ? 'opacity-50 grayscale-[0.5]' : ''}">
                        <h4 class="font-black text-lg">${item.name} <span class="text-orange-600 text-sm ml-2 font-bold">¥${item.price}</span></h4>
                        <div class="grid grid-cols-3 gap-2 mt-4">
                            ${FLAVORS.map(flavor => {
                                const key = `${item.id}-${flavor}`;
                                const count = cart[key] || 0;
                                return `
                                    <div class="flex flex-col gap-1">
                                        <span class="text-[9px] text-stone-400 font-black text-center">${flavor}</span>
                                        <div class="bg-stone-50 rounded-xl flex items-center justify-between p-1 border border-stone-100">
                                            <button onclick="updateCart('${item.id}', '${flavor}', -1)" class="w-7 h-7 rounded-lg bg-white shadow-sm font-bold active:scale-90">-</button>
                                            <span class="text-xs font-black">${count}</span>
                                            <button onclick="updateCart('${item.id}', '${flavor}', 1)" class="w-7 h-7 rounded-lg bg-white shadow-sm font-bold active:scale-90">+</button>
                                        </div>
                                    </div>`;
                            }).join('')}
                        </div>
                        ${isSoldOut ? '<div class="absolute inset-0 bg-white/40 backdrop-blur-[1px] rounded-3xl flex items-center justify-center font-black text-red-600 tracking-widest text-xl rotate-[-5deg] pointer-events-none">SOLD OUT</div>' : ''}
                    </div>`;
            }).join('');
        }

        window.updateCart = (id, flavor, delta) => {
            const key = `${id}-${flavor}`;
            cart[key] = Math.max(0, (cart[key] || 0) + delta);
            if (cart[key] === 0) delete cart[key];
            updateUI();
        };

        function updateUI() {
            let total = 0;
            Object.entries(cart).forEach(([key, qty]) => {
                const item = MENU_ITEMS.find(m => m.id === key.split('-')[0]);
                total += item.price * qty;
            });
            document.getElementById('total-price').innerText = `¥${total.toLocaleString()}`;

            const dateInput = document.getElementById('order-date').value;
            const timeInput = document.getElementById('order-time').value;
            const locationBox = document.getElementById('location-box');
            const locationIcon = document.getElementById('location-icon');
            const locationText = document.getElementById('location-text');
            const submitBtn = document.getElementById('submit-btn');

            let locationName = '日付を選択してください';
            let isInvalid = true;

            if (dateInput) {
                if (holidays.includes(dateInput)) {
                    locationName = '【臨時定休日】です';
                    isInvalid = true;
                } else {
                    const day = new Date(dateInput).getDay();
                    locationName = SCHEDULE[day] || '定休日です';
                    isInvalid = locationName.includes('定休日');
                }
            }

            locationText.innerText = locationName;
            
            if (isInvalid && dateInput) {
                locationBox.classList.remove('bg-orange-50', 'border-orange-100', 'text-orange-900');
                locationBox.classList.add('bg-red-50', 'border-red-100', 'text-red-900');
                if (locationIcon) {
                    locationIcon.classList.remove('text-orange-600');
                    locationIcon.classList.add('text-red-600');
                }
            } else {
                locationBox.classList.remove('bg-red-50', 'border-red-100', 'text-red-900');
                locationBox.classList.add('bg-orange-50', 'border-orange-100', 'text-orange-900');
                if (locationIcon) {
                    locationIcon.classList.remove('text-red-600');
                    locationIcon.classList.add('text-orange-600');
                }
            }

            submitBtn.disabled = total === 0 || !dateInput || !timeInput || isInvalid;
            renderMenu();
        }

        document.getElementById('order-date').onchange = updateUI;
        document.getElementById('order-time').onchange = updateUI;

        document.getElementById('submit-btn').onclick = async () => {
            const name = document.getElementById('customer-name').value;
            const phone = document.getElementById('customer-phone').value;
            const date = document.getElementById('order-date').value;
            const time = document.getElementById('order-time').value;

            if (!name || !phone) return alert('お名前と電話番号を入力してください');
            
            document.getElementById('loading-overlay').classList.remove('hidden');
            const orderId = Math.floor(1000 + Math.random() * 9000).toString();
            let total = 0;
            Object.entries(cart).forEach(([key, qty]) => {
                const item = MENU_ITEMS.find(m => m.id === key.split('-')[0]);
                total += item.price * qty;
            });

            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'reservations'), {
                    orderId, name, phone, date, time,
                    location: document.getElementById('location-text').innerText,
                    items: cart,
                    total,
                    createdAt: serverTimestamp()
                });

                document.getElementById('display-order-id').innerText = `#${orderId}`;
                document.getElementById('main-content').classList.add('hidden');
                document.getElementById('footer-bar').classList.add('hidden');
                document.getElementById('success-screen').classList.remove('hidden');
                window.scrollTo(0,0);
            } catch (e) {
                console.error(e);
                alert("予約に失敗しました。");
            } finally {
                document.getElementById('loading-overlay').classList.add('hidden');
            }
        };

        renderMenu();
        lucide.createIcons();
    </script>
</body>
</html>
