<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>予約 | やきとり ひまわり</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; -webkit-tap-highlight-color: transparent; }
        .loading-spinner { border: 3px solid rgba(234, 88, 12, 0.1); border-left-color: #ea580c; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-stone-100 pb-32 text-stone-900">

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="fixed inset-0 bg-white/80 backdrop-blur-sm z-[100] flex items-center justify-center hidden">
        <div class="flex flex-col items-center gap-3">
            <div class="loading-spinner"></div>
            <p class="text-[10px] font-black text-orange-600 tracking-widest uppercase">Processing...</p>
        </div>
    </div>

    <!-- Header -->
    <header class="bg-white/80 backdrop-blur-md border-b border-stone-200 sticky top-0 z-40 px-6 py-4">
        <div class="max-w-2xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-orange-600 p-2 rounded-xl text-white shadow-lg shadow-orange-200">
                    <i data-lucide="store" class="w-5 h-5"></i>
                </div>
                <div>
                    <h1 class="text-lg font-black italic tracking-tighter leading-none">やきとり ひまわり</h1>
                    <p class="text-[10px] text-stone-400 font-bold mt-1 tracking-widest uppercase">Takeout Reservation</p>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main id="main-content" class="max-w-2xl mx-auto p-4 space-y-6">
        <!-- Customer Info Section -->
        <section class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-stone-200 space-y-4">
            <div class="flex items-center gap-2 mb-2">
                <i data-lucide="user" class="text-orange-600 w-4 h-4"></i>
                <h3 class="font-black text-xs uppercase tracking-widest text-stone-400">お客様情報</h3>
            </div>
            
            <div class="space-y-3">
                <div class="relative">
                    <i data-lucide="calendar" class="absolute left-4 top-1/2 -translate-y-1/2 text-stone-300 w-5 h-5"></i>
                    <input type="date" id="order-date" required class="w-full pl-12 pr-4 py-4 bg-stone-50 rounded-2xl font-bold border-none focus:ring-2 focus:ring-orange-500 transition-all">
                </div>

                <div class="p-4 bg-orange-50 rounded-2xl border border-orange-100 flex items-start gap-3">
                    <i data-lucide="map-pin" class="text-orange-600 shrink-0 mt-0.5 w-4 h-4"></i>
                    <div>
                        <p class="text-[10px] font-black text-orange-400 uppercase tracking-widest">受取場所</p>
                        <p id="location-text" class="font-black text-sm text-orange-900">日付を選択してください</p>
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    <div class="relative">
                        <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 text-stone-300 w-5 h-5"></i>
                        <input type="text" id="customer-name" required placeholder="お名前" class="w-full pl-12 pr-4 py-4 bg-stone-50 rounded-2xl font-bold border-none">
                    </div>
                    <div class="relative">
                        <i data-lucide="phone" class="absolute left-4 top-1/2 -translate-y-1/2 text-stone-300 w-5 h-5"></i>
                        <input type="tel" id="customer-phone" required placeholder="電話番号" class="w-full pl-12 pr-4 py-4 bg-stone-50 rounded-2xl font-bold border-none">
                    </div>
                </div>
            </div>
        </section>

        <!-- Menu Section -->
        <section class="space-y-4">
            <div class="flex items-center justify-between px-2">
                <div class="flex items-center gap-2">
                    <i data-lucide="clock" class="text-orange-600 w-4 h-4"></i>
                    <h3 class="font-black text-xs uppercase tracking-widest text-stone-400">お品書き</h3>
                </div>
                <span class="text-[10px] text-stone-400 font-bold">1本からご注文いただけます</span>
            </div>

            <div id="menu-container" class="grid gap-3">
                <!-- JavaScriptで生成 -->
            </div>
        </section>
    </main>

    <!-- Success Screen (Hidden by default) -->
    <div id="success-screen" class="min-h-screen bg-stone-50 flex items-center justify-center p-6 text-center hidden">
        <div class="bg-white p-10 rounded-[3rem] shadow-xl border border-stone-200 max-w-sm w-full">
            <div class="bg-green-100 text-green-600 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6">
                <i data-lucide="check-circle" class="w-10 h-10"></i>
            </div>
            <h2 class="text-2xl font-black mb-2">予約完了！</h2>
            <div class="my-6 p-4 bg-stone-50 rounded-2xl border-2 border-dashed border-stone-200">
                <p class="text-[10px] font-black text-stone-400 uppercase tracking-widest mb-1">予約番号</p>
                <p id="display-order-id" class="text-4xl font-black text-stone-900 tracking-widest">#----</p>
            </div>
            <p class="text-stone-500 text-sm font-bold mb-8 leading-relaxed">
                ご注文を承りました。<br/>受取時にこの画面を店員へお見せください。
            </p>
            <button onclick="location.reload()" class="w-full bg-stone-900 text-white font-black py-4 rounded-2xl hover:bg-stone-800 transition-all">
                新しく注文する
            </button>
        </div>
    </div>

    <!-- Footer Action Bar -->
    <div id="footer-bar" class="fixed bottom-8 left-4 right-4 z-50">
        <div class="max-w-2xl mx-auto bg-stone-900 text-white p-4 rounded-[2.5rem] shadow-2xl flex items-center gap-4 border border-white/10">
            <div class="pl-4">
                <p class="text-[10px] text-stone-500 font-black uppercase tracking-widest">Total Price</p>
                <div class="flex items-baseline gap-1">
                    <span id="total-price" class="text-2xl font-black text-orange-500 italic">¥0</span>
                    <span id="total-count" class="text-[10px] font-bold text-stone-400">(0本)</span>
                </div>
            </div>
            
            <button id="submit-btn" disabled class="flex-1 bg-orange-600 hover:bg-orange-500 disabled:bg-stone-800 disabled:text-stone-600 text-white font-black py-4 rounded-2xl flex items-center justify-center gap-2 transition-all shadow-lg active:scale-95">
                <span>予約を確定する</span>
                <i data-lucide="chevron-right" class="w-5 h-5"></i>
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, doc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBFHd2b0KlHvpgMi-oax7llhNaQV-yiLq8",
            authDomain: "yakitori-81aab.firebaseapp.com",
            projectId: "yakitori-81aab",
            storageBucket: "yakitori-81aab.firebasestorage.app",
            messagingSenderId: "765393606286",
            appId: "1:765393606286:web:755c313fbed6e8ea42dbdf"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'yakitori-himawari-main';

        const MENU_ITEMS = [
            { id: 'm1', name: 'ねぎま', price: 140 },
            { id: 'm2', name: '焼き鳥', price: 140 },
            { id: 'm3', name: '手羽中', price: 140 },
            { id: 'm4', name: '鳥軟骨', price: 140 },
            { id: 'm5', name: '豚レバー', price: 140 },
            { id: 'm6', name: 'カシラ', price: 140 },
            { id: 'm7', name: '豚タン', price: 140 },
            { id: 'm8', name: '豚白モツ', price: 120 },
            { id: 'm9', name: '鶏皮', price: 120 },
            { id: 'm10', name: 'つくね', price: 120 },
            { id: 'm11', name: 'むね肉ニンニク', price: 120 },
        ];
        const FLAVORS = ['タレ', '塩', '無'];
        const SCHEDULE = { 0: 'ジョイフーズ 藪塚店', 4: 'ジョイフーズ 藪塚店', 5: 'アバンセ 玉村店', 6: 'アバンセ 粕川店' };

        let cart = {};
        let soldOutItems = {};
        let user = null;

        // Initialize Icons
        lucide.createIcons();

        // Auth
        onAuthStateChanged(auth, (u) => {
            user = u;
            if (!u) signInAnonymously(auth);
            else startSync();
        });

        function startSync() {
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'inventory', 'status'), (snap) => {
                soldOutItems = snap.exists() ? snap.data().soldOut : {};
                renderMenu();
            });
        }

        function renderMenu() {
            const container = document.getElementById('menu-container');
            container.innerHTML = MENU_ITEMS.map(item => {
                const isSoldOut = soldOutItems[item.id];
                return `
                    <div class="bg-white rounded-3xl border border-stone-200 p-5 relative overflow-hidden ${isSoldOut ? 'bg-stone-50' : ''}">
                        ${isSoldOut ? '<div class="absolute inset-0 bg-stone-100/60 backdrop-blur-[1px] flex items-center justify-center z-10"><span class="bg-red-600 text-white text-[10px] font-black px-4 py-2 rounded-full shadow-lg rotate-[-5deg]">SOLD OUT</span></div>' : ''}
                        <div class="flex justify-between items-start mb-5">
                            <div>
                                <h4 class="font-black text-lg">${item.name}</h4>
                                <p class="text-orange-600 font-black text-sm">¥${item.price}</p>
                            </div>
                        </div>
                        <div class="grid grid-cols-3 gap-2">
                            ${FLAVORS.map(flavor => {
                                const key = `${item.id}-${flavor}`;
                                const count = cart[key] || 0;
                                return `
                                    <div class="flex flex-col gap-2">
                                        <span class="text-[9px] text-stone-400 font-black text-center uppercase">${flavor}</span>
                                        <div class="bg-stone-50 rounded-2xl flex items-center justify-between p-1 border border-stone-100">
                                            <button onclick="updateCart('${item.id}', '${flavor}', -1)" class="w-8 h-8 rounded-xl flex items-center justify-center transition-all ${count > 0 ? 'bg-white text-stone-900 shadow-sm' : 'text-stone-200'}">
                                                <i data-lucide="minus" class="w-3.5 h-3.5"></i>
                                            </button>
                                            <span class="text-sm font-black ${count > 0 ? 'text-orange-600' : 'text-stone-300'}">${count}</span>
                                            <button onclick="updateCart('${item.id}', '${flavor}', 1)" class="w-8 h-8 rounded-xl bg-white text-orange-600 shadow-sm flex items-center justify-center">
                                                <i data-lucide="plus" class="w-3.5 h-3.5"></i>
                                            </button>
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
            }).join('');
            lucide.createIcons();
        }

        window.updateCart = (id, flavor, delta) => {
            const key = `${id}-${flavor}`;
            const current = cart[key] || 0;
            const next = Math.max(0, current + delta);
            if (next === 0) delete cart[key];
            else cart[key] = next;
            updateUI();
        };

        function updateUI() {
            let total = 0;
            let count = 0;
            Object.entries(cart).forEach(([key, qty]) => {
                const item = MENU_ITEMS.find(m => m.id === key.split('-')[0]);
                total += item.price * qty;
                count += qty;
            });

            document.getElementById('total-price').innerText = `¥${total.toLocaleString()}`;
            document.getElementById('total-count').innerText = `(${count}本)`;
            
            const dateInput = document.getElementById('order-date');
            const submitBtn = document.getElementById('submit-btn');
            const day = new Date(dateInput.value).getDay();
            const location = SCHEDULE[day] || '本日は定休日です';
            
            document.getElementById('location-text').innerText = location;
            submitBtn.disabled = count === 0 || !dateInput.value || location === '本日は定休日です';
            
            renderMenu();
        }

        document.getElementById('order-date').onchange = updateUI;

        document.getElementById('submit-btn').onclick = async () => {
            const name = document.getElementById('customer-name').value;
            const phone = document.getElementById('customer-phone').value;
            const date = document.getElementById('order-date').value;
            
            if (!name || !phone) return alert('お名前と電話番号を入力してください');

            document.getElementById('loading-overlay').classList.remove('hidden');
            
            try {
                const orderId = Math.floor(1000 + Math.random() * 9000).toString();
                const total = Object.entries(cart).reduce((acc, [key, qty]) => {
                    const item = MENU_ITEMS.find(m => m.id === key.split('-')[0]);
                    return acc + (item.price * qty);
                }, 0);

                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'reservations'), {
                    orderId,
                    name,
                    phone,
                    date,
                    location: SCHEDULE[new Date(date).getDay()],
                    items: cart,
                    total,
                    createdAt: serverTimestamp(),
                    status: 'pending'
                });

                document.getElementById('display-order-id').innerText = `#${orderId}`;
                document.getElementById('main-content').classList.add('hidden');
                document.getElementById('footer-bar').classList.add('hidden');
                document.getElementById('success-screen').classList.remove('hidden');
                window.scrollTo(0,0);
            } catch (e) {
                alert('送信に失敗しました。');
            } finally {
                document.getElementById('loading-overlay').classList.add('hidden');
            }
        };

        renderMenu();
    </script>
</body>
</html>
